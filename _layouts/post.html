---
layout: default
---

<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date: "%Y-%m-%d" }}</p>
    {% if page.summary %}
      <p class="summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="content">
    {{ content }}
  </div>

  <hr />
  <p><a href="{{ '/' | relative_url }}">← Back to home</a></p>
</article>
