name: push-log

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: push-log-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate internal push log for this push
        run: |
          bash scripts/gen_push_post.sh

      - name: Commit and push (if changed)
        run: |
          set -e
          # Note: `git diff --quiet` does NOT detect untracked files.
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "vibe-coding-study bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ops/push-logs/*.md
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "chore: add push log post (${{ github.sha }})"
          git push
