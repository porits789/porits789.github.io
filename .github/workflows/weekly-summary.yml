name: weekly-summary

on:
  schedule:
    # Sunday 23:00 KST = Sunday 14:00 UTC
    - cron: "0 14 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-summary
  cancel-in-progress: false

jobs:
  generate-weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate weekly summary post
        run: |
          bash scripts/gen_weekly_summary.sh

      - name: Commit and push (if changed)
        run: |
          set -e
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "vibe-coding-study bot"
          git config user.email "actions@users.noreply.github.com"
          git add _posts/*.md
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "chore: add weekly summary post"
          git push
